  }
  .reelArea{
    position:absolute;left:4.4%;right:3.8%;top:5.4%;bottom:5.2%;
    display:grid;grid-template-columns:repeat(6,1fr);gap:0;
  }
  .reel{position:relative;overflow:hidden;height:100%}
  .strip{position:absolute;left:0;top:0;width:100%;will-change:transform}
  .cell{display:grid;place-items:center;width:100%}
  .cell img{width:76%;max-height:80%;object-fit:contain;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.45))}
  .cell.blur img{filter:blur(1.2px) drop-shadow(0 2px 3px rgba(0,0,0,.45))}
  .cell.scatter{position:relative}
  .cell.scatter:before{content:"";position:absolute;inset:6%;border-radius:14px;
    background:radial-gradient(circle,rgba(255,224,120,.55),transparent 68%);
    box-shadow:0 0 22px 6px rgba(255,206,74,.55);animation:sc 1s infinite}
  .cell.scatter img{width:100%;max-height:100%;filter:drop-shadow(0 0 8px rgba(255,206,74,.9))}
  @keyframes sc{0%,100%{opacity:.55;transform:scale(.94)}50%{opacity:1;transform:scale(1.06)}}
  /* one-shot "just landed" pulse + expanding ring */
  .cell.scatter.land img{animation:scatterLand .55s cubic-bezier(.34,1.56,.64,1)}
  @keyframes scatterLand{0%{transform:scale(.25);opacity:.2}55%{transform:scale(1.3)}100%{transform:scale(1)}}
  .cell.scatter.land:after{content:"";position:absolute;inset:8%;border-radius:50%;
    border:3px solid #ffe36b;box-shadow:0 0 16px #ffce4a;pointer-events:none;
    animation:ring .62s ease-out forwards}
  @keyframes ring{0%{transform:scale(.35);opacity:.95}100%{transform:scale(1.95);opacity:0}}
  /* frame gives a little bounce when the feature triggers */
  .frame.thump{animation:thump .45s ease}
  @keyframes thump{0%,100%{transform:none}28%{transform:translateY(-5px) scale(1.012)}62%{transform:translateY(2px)}}

  /* ---------- controls ---------- */
  .controls{width:100%;margin-top:14px;display:flex;flex-direction:column;align-items:center}
  .spinBtn{
    width:96px;height:96px;border-radius:50%;border:0;cursor:pointer;position:relative;
    background:radial-gradient(circle at 50% 32%, rgba(72,74,86,.72), rgba(8,8,14,.94));
    box-shadow:0 8px 22px rgba(0,0,0,.55), inset 0 0 0 3px rgba(255,255,255,.9), inset 0 4px 12px rgba(255,255,255,.14);
    display:grid;place-items:center;transition:transform .08s}
  .spinBtn:active{transform:scale(.93)}
  .spinBtn:disabled{cursor:default}
  .spinBtn img{width:52px;height:auto;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
  .spinBtn.spinning img{animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .spinLabel{margin-top:9px;font-family:'Anton',sans-serif;font-size:19px;letter-spacing:3px;color:#fff;
    text-transform:uppercase;text-shadow:0 2px 4px rgba(0,0,0,.7)}
  @keyframes shine{0%{left:-60%}55%,100%{left:140%}}
  .hint{margin-top:10px;font-size:12px;font-weight:800;color:#ffe9a8;text-shadow:0 1px 3px rgba(0,0,0,.7);min-height:16px;text-align:center}

  /* ---------- congrats overlay ---------- */
  .overlay{position:fixed;inset:0;z-index:50;display:none;place-items:center;padding:20px;
    background:rgba(6,3,14,.8);backdrop-filter:blur(5px)}
  .overlay.show{display:grid;animation:fade .3s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{width:100%;max-width:360px;text-align:center;position:relative;padding:26px 20px 22px;
    border-radius:26px;
    background:linear-gradient(180deg,#8a37e6 0%,#6a1fc7 55%,#4d158f 100%);
    border:3px solid #ffd451;
    box-shadow:0 0 0 4px #b9781a,0 20px 60px rgba(0,0,0,.7),inset 0 3px 0 rgba(255,255,255,.25),inset 0 -6px 20px rgba(40,0,80,.6);
    animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .card .crown{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:44px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
  .congrats-t{font-family:'Baloo 2',cursive;font-weight:800;font-size:31px;line-height:1;text-transform:uppercase;letter-spacing:.5px;
    color:#ffe36b;-webkit-text-stroke:2px #6a3b00;paint-order:stroke fill;
    text-shadow:0 3px 0 #6a3b00,0 5px 8px rgba(0,0,0,.4);margin-top:4px}
  .won{font-family:'Baloo 2',cursive;font-weight:800;font-size:17px;letter-spacing:1px;text-transform:uppercase;
    color:#5affa0;-webkit-text-stroke:1px #124a2a;paint-order:stroke fill;margin:12px 0 8px}
  .numbar{position:relative;width:88%;margin:0 auto;aspect-ratio:512/104;display:grid;place-items:center}
  .numbar img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill}
  .numbar span{position:relative;font-family:'Baloo 2',cursive;font-weight:800;font-size:44px;line-height:1;
    color:#ffe36b;-webkit-text-stroke:2px #6a3b00;paint-order:stroke fill;text-shadow:0 3px 6px rgba(0,0,0,.5)}
  .fs{font-family:'Baloo 2',cursive;font-weight:800;font-size:22px;letter-spacing:1px;text-transform:uppercase;
    color:#5affa0;-webkit-text-stroke:1px #124a2a;paint-order:stroke fill;margin:8px 0 2px}
  .card small{display:block;color:#e9dcff;font-size:12px;margin-top:6px}
  .claim{display:block;margin:18px auto 4px;border:0;cursor:pointer;text-decoration:none;text-align:center;
    font-family:'Anton',sans-serif;font-size:22px;letter-spacing:1px;text-transform:uppercase;color:#0d3a1c;
    padding:15px 18px;border-radius:15px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#7dfaa6,#33d17a 46%,#1fa85f);
    box-shadow:0 6px 0 #12693b,0 12px 24px rgba(51,209,122,.45),inset 0 2px 0 rgba(255,255,255,.6)}
  .claim:active{transform:translateY(4px);box-shadow:0 2px 0 #12693b}
  .claim .shine{position:absolute;top:0;left:-60%;width:38%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.75),transparent);animation:shine 2.2s infinite}
  .redir{color:#c9b3f0;font-size:10px;margin-top:10px;letter-spacing:.4px}

  .conf{position:fixed;top:-14px;font-size:16px;pointer-events:none;z-index:49;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(112vh) rotate(560deg);opacity:.9}}
</style>
</head>

function buildDestination(){
  try{ const d=new URL(CONFIG.DESTINATION);
    if(CONFIG.PASS_THROUGH_PARAMS){ new URLSearchParams(location.search).forEach((v,k)=>d.searchParams.set(k,v)); }
    return d.toString();
  }catch(e){ return CONFIG.DESTINATION; }
}
document.getElementById('claim').setAttribute('href', buildDestination());

const COLS=6, ROWS=5, PAD=18;           // PAD = random cells above the final 5
const reelArea=document.getElementById('reelArea');
const spinBtn=document.getElementById('spinBtn');
const hint=document.getElementById('hint');
let spinning=false, done=false, strips=[];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

/* choose 5 scatter target cells spread across distinct columns */
function pickScatters(){
  const cols=[0,1,2,3,4,5];
  for(let i=cols.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cols[i],cols[j]]=[cols[j],cols[i]];}
  const chosen=cols.slice(0,CONFIG.SCATTERS);
  const set=new Set();
  chosen.forEach(c=>set.add(c+','+Math.floor(Math.random()*ROWS)));
  return set;
}

function cellImg(src,isScatter){
  const cell=document.createElement('div');
  cell.className='cell'+(isScatter?' scatter':'');
  const img=document.createElement('img'); img.src=src; img.alt='';
  cell.appendChild(img); return cell;
}

function build(scatterSet){
  reelArea.innerHTML=''; strips=[];
  for(let c=0;c<COLS;c++){
    const reel=document.createElement('div'); reel.className='reel';
    const strip=document.createElement('div'); strip.className='strip';
    // final 5 (rows 0..4)
    const finals=[];
    for(let r=0;r<ROWS;r++){
      const isSc=scatterSet.has(c+','+r);
      finals.push({src:isSc?SCATTER:rnd(SYMS),sc:isSc});
    }
    // random spin cells on top
    const list=[];
    for(let i=0;i<PAD;i++) list.push({src:rnd(SYMS),sc:false});
    list.push(...finals);
    list.forEach(o=>strip.appendChild(cellImg(o.src,o.sc)));
    reel.appendChild(strip); reelArea.appendChild(reel);
    strips.push(strip);
  }
  layout();
}

function layout(){
  const h=reelArea.clientHeight; if(!h) return;
  const cellH=h/ROWS;
  document.querySelectorAll('.cell').forEach(c=>{c.style.height=cellH+'px';});
  // park each strip so the top random cells show (final 5 hidden below)
  strips.forEach(s=>{ if(!s.dataset.landed) s.style.transform='translateY(0px)'; });
}
window.addEventListener('resize', layout);

function spin(){
  if(spinning||done) return;
  spinning=true; spinBtn.disabled=true; spinBtn.classList.add('spinning');
  document.getElementById('spinLabel').textContent='Spinning…';
  hint.textContent='Spinning the reels…';
  const scatterSet=pickScatters();
  build(scatterSet);

  const h=reelArea.clientHeight, cellH=h/ROWS;
  const endY=-(PAD*cellH);
  let stopped=0;
  strips.forEach((s,c)=>{
    s.querySelectorAll('.cell').forEach(cell=>cell.classList.add('blur'));
    // start: reset then animate to endY, staggered per column
    s.style.transition='none'; s.style.transform='translateY(0px)';
    void s.offsetWidth;
    const dur=1.9+c*0.28;
    setTimeout(()=>{
      s.style.transition='transform '+dur+'s cubic-bezier(.2,.7,.25,1)';
      s.style.transform='translateY('+endY+'px)';
    }, 60);
    const onEnd=(e)=>{
      if(e.propertyName!=='transform') return;
      s.removeEventListener('transitionend',onEnd);
      s.dataset.landed='1';
      s.querySelectorAll('.cell').forEach(cell=>cell.classList.remove('blur'));
      // pulse each scatter as its reel lands
      s.querySelectorAll('.cell.scatter').forEach(cell=>{
        cell.classList.remove('land'); void cell.offsetWidth; cell.classList.add('land');
        if(navigator.vibrate) navigator.vibrate(18);
      });
      stopped++;
      if(stopped===COLS) allStopped();
    };
    s.addEventListener('transitionend',onEnd);
  });
}

function allStopped(){
  hint.textContent='5 Scatters — Free Spins triggered!';
  const fr=document.querySelector('.frame');
  fr.classList.remove('thump'); void fr.offsetWidth; fr.classList.add('thump');
  if(navigator.vibrate) navigator.vibrate([25,40,60]);
  setTimeout(showWin, 1100);
}

function showWin(){
  done=true; spinning=false;
  const ov=document.getElementById('overlay'); ov.classList.add('show');
  confetti();
  const el=document.getElementById('fsNum'); let n=0, t=CONFIG.FREE_SPINS, step=Math.max(1,Math.round(t/40));
  const iv=setInterval(()=>{ n=Math.min(t,n+step); el.textContent=n; if(n>=t) clearInterval(iv); },28);
  if(CONFIG.AUTO_REDIRECT_MS>0) setTimeout(redirect, CONFIG.AUTO_REDIRECT_MS);
}

let redirecting=false;
function redirect(e){ if(e) e.preventDefault(); if(redirecting) return; redirecting=true;
  document.getElementById('redir').textContent='Redirecting…';
  window.location.href=buildDestination();
}
document.getElementById('claim').addEventListener('click', redirect);
spinBtn.addEventListener('click', spin);

function confetti(){
  const cols=['🎉','⭐','💜','👑','✨','💗'];
  for(let i=0;i<32;i++){
    const c=document.createElement('div'); c.className='conf'; c.textContent=cols[i%cols.length];
    c.style.left=Math.random()*100+'vw'; c.style.animationDuration=(1.8+Math.random()*1.7)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s'; document.body.appendChild(c);
    setTimeout(()=>c.remove(),3800);
  }
}

/* initial idle board */
build(new Set());
window.addEventListener('load', layout);
setTimeout(layout, 60);
</script>
</body>
